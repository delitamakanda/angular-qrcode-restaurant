<article class="menu-item-card">
  <h3>{{ item().name }}</h3>
  <p>{{ item().description }}</p>
  <p>Price: {{ item().base_price | currencyFormat }}</p>

  @if (item().is_sold_out) {
    <span>Sold out</span>
  } @else {
    <button type="button" (click)="addToCart()">Add to cart</button>
  }
</article>
